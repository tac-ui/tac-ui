name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Bump versions
        run: |
          pnpm --filter @tac-ui/shared version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/tokens version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/icon version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/icon-native version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/web version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/native version ${{ inputs.version }} --no-git-tag-version

      - name: Resolve workspace dependencies
        run: |
          SHARED_VERSION=$(node -p "require('./packages/shared/package.json').version")
          TOKENS_VERSION=$(node -p "require('./packages/tokens/package.json').version")
          ICON_VERSION=$(node -p "require('./packages/icon/package.json').version")

          # tokens depends on shared
          cd packages/tokens
          sed -i "s/\"workspace:\*\"/\"^$SHARED_VERSION\"/g" package.json
          cd ../..

          # web depends on shared, tokens, icon
          cd packages/web
          sed -i "s/\"@tac-ui\/shared\": \"workspace:\*\"/\"@tac-ui\/shared\": \"^$SHARED_VERSION\"/g" package.json
          sed -i "s/\"@tac-ui\/tokens\": \"workspace:\*\"/\"@tac-ui\/tokens\": \"^$TOKENS_VERSION\"/g" package.json
          sed -i "s/\"@tac-ui\/icon\": \"workspace:\*\"/\"@tac-ui\/icon\": \"^$ICON_VERSION\"/g" package.json
          cd ../..

          # native depends on shared, tokens
          cd packages/native
          sed -i "s/\"@tac-ui\/shared\": \"workspace:\*\"/\"@tac-ui\/shared\": \"^$SHARED_VERSION\"/g" package.json
          sed -i "s/\"@tac-ui\/tokens\": \"workspace:\*\"/\"@tac-ui\/tokens\": \"^$TOKENS_VERSION\"/g" package.json
          cd ../..

      - name: Publish @tac-ui/shared
        run: pnpm --filter @tac-ui/shared publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tac-ui/tokens
        run: pnpm --filter @tac-ui/tokens publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tac-ui/icon
        run: pnpm --filter @tac-ui/icon publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tac-ui/icon-native
        run: pnpm --filter @tac-ui/icon-native publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tac-ui/web
        run: pnpm --filter @tac-ui/web publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @tac-ui/native
        run: pnpm --filter @tac-ui/native publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/web/package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          # Restore workspace deps before committing
          git checkout -- packages/tokens/package.json packages/web/package.json packages/native/package.json

          # Re-bump versions (clean workspace deps)
          pnpm --filter @tac-ui/shared version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/tokens version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/icon version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/icon-native version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/web version ${{ inputs.version }} --no-git-tag-version
          pnpm --filter @tac-ui/native version ${{ inputs.version }} --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push && git push --tags
